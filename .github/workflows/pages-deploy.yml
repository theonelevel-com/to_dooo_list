# to-do — GitHub Pages auto-deploy on push to main.
#
# The PWA is a static single page (todo.html + sw.js + manifest + icons),
# served straight from the repo root via the Pages "deploy from branch"
# config. This workflow flips that to the official "Pages from Actions"
# build flow, which publishes a clean artifact on every push and lets you
# add a build step later without changing the deploy mechanism.
#
# One-time repo setup (Settings → Pages):
#   Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'todo.html'
      - 'manifest.json'
      - 'service-worker.js'
      - 'icons/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Stage site
        run: |
          mkdir -p _site
          cp todo.html _site/
          cp manifest.json _site/
          cp service-worker.js _site/
          cp -r icons _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
