# to.dooo — Cloudflare Pages auto-deploy on push to main.
#
# The PWA is served from the repo ROOT (index.html is at the top level), so the
# deploy target is "." rather than "public".
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — token with Pages:Edit + Account:Read
#                           (dash.cloudflare.com/profile/api-tokens → "Edit
#                            Cloudflare Workers" template, scoped to the account)
#   CLOUDFLARE_ACCOUNT_ID — from the Cloudflare dashboard URL / project overview

name: Deploy PWA to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'service-worker.js'
      - 'sync-bridge.js'
      - 'vendor/**'
      - 'manifest.json'
      - 'icons/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy . --project-name=to-dooo --branch=main
